site_name: Documentação de Integração
site_description: Documentação técnica das views de integração
site_author: Seu Time

theme:
  name: material
  language: pt-BR
  custom_dir: overrides        # ← pasta para customizações
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/nav.css        # ← arquivo CSS que vai estilizar o menu

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Início: index.md
  - Obrigatórias:
    - Visão Geral: views/obrigatorias/index.md
    - Cadastro:
      - expert_cliente: views/obrigatorias/cadastro/expert_cliente.md
      - expert_fornecedor: views/obrigatorias/cadastro/expert_fornecedor.md
      - expert_produto: views/obrigatorias/cadastro/expert_produto.md
    - Movimentação Entrada:
      - Visão Geral: views/obrigatorias/movimentacao_entrada/index.md
      - expert_entrada: views/obrigatorias/movimentacao_entrada/expert_entrada.md
      - expert_entradaitem: views/obrigatorias/movimentacao_entrada/expert_entradaitem.md
    - Movimentação Saída:
      - Visão Geral: views/obrigatorias/movimentacao_saida/index.md
      - expert_saida: views/obrigatorias/movimentacao_saida/expert_saida.md
      - expert_saidaitem: views/obrigatorias/movimentacao_saida/expert_saidaitem.md
  - Opcionais:
    - Visão Geral: views/opcionais/index.md
    - Cadastros:
      - Visão Geral: views/opcionais/cadastros/index.md
      - expert_grupo: views/opcionais/cadastros/expert_grupo.md
      - expert_regiao: views/opcionais/cadastros/expert_regiao.md
      - expert_rota: views/opcionais/cadastros/expert_rota.md
      - expert_embalagem: views/opcionais/cadastros/expert_embalagem.md
    - Movimentação Entrada:
      - Visão Geral: views/opcionais/movimentacao_entrada/index.md
      - expert_carga: views/opcionais/movimentacao_entrada/expert_carga.md
    - Movimentação Saída:
      - Visão Geral: views/opcionais/movimentacao_saida/index.md
      - expert_carregamento: views/opcionais/movimentacao_saida/expert_carregamento.md
    - Estoque:
      - Visão Geral: views/opcionais/estoque/index.md
      - expert_estoque: views/opcionais/estoque/expert_estoque.md
    - Auditoria:
      - Visão Geral: views/opcionais/auditoria/index.md
      - expert_auditoria: views/opcionais/auditoria/expert_auditoria.md
  - Procedures:                                              # ← nova seção
    - Visão Geral: procedures/index.md
    - Entradas:
      - Visão Geral: procedures/entradas/index.md
      - Retorno Importação: procedures/entradas/sp_retorno_imp_entrada.md
      - Retorno Exclusão: procedures/entradas/sp_retorno_libera_entrada.md
      - Retorno Finalização: procedures/entradas/sp_retorno_exp_entrada.md
    - Saídas:
      - Visão Geral: procedures/saidas/index.md
      - Retorno Importação: procedures/saidas/sp_retorno_imp_pedido.md
      - Retorno Exclusão: procedures/saidas/sp_retorno_libera_pedido.md
      - Retorno Finalização: procedures/saidas/sp_retorno_exp_pedido.md